<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>idealist · план</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;
  --card:#1c1c1c;
  --card2:#242424;
  --border:#2f2f2f;
  --border2:#3d3d3d;
  --terra:#de7a58;
  --terra-soft:rgba(222,122,88,.15);
  --green:#3f574f;
  --green-soft:rgba(63,87,79,.2);
  --green-text:#6daa96;
  --text:#f0ece4;
  --text2:#c8c2b8;
  --text3:#8a8480;
  --text4:#5a5652;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;font-size:16px;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:80px;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:999;}
#loading svg{width:140px;}
.lbar{width:40px;height:1px;background:var(--border2);position:relative;overflow:hidden;}
.lbar::after{content:'';position:absolute;inset:0;background:var(--terra);transform:translateX(-100%);animation:lb 1.6s ease forwards;}
@keyframes lb{to{transform:translateX(0)}}
.lhint{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text4);margin-top:-12px;}

/* ── APP ── */
#app{display:none;}

/* ── HEADER ── */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:18px 20px 0;position:sticky;top:0;z-index:100;}
.topbar-inner{max-width:680px;margin:0 auto;}
.topbar-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;}
.logo-wrap{display:flex;flex-direction:column;gap:6px;}
.logo-wrap svg{height:20px;width:auto;}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text4);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-chip{font-size:12px;font-weight:500;color:var(--text3);background:var(--card);border:1px solid var(--border);padding:5px 12px;border-radius:20px;}
.icon-btn{width:32px;height:32px;border:1px solid var(--border2);background:none;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .15s;}
.icon-btn:hover{border-color:var(--terra);color:var(--terra);}
.icon-btn.spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PERSON PILLS ── */
.persons-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none;}
.persons-row::-webkit-scrollbar{display:none;}
.person-pill{padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border2);background:none;color:var(--text3);border-radius:20px;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif;}
.person-pill:hover{border-color:var(--text3);color:var(--text2);}
.person-pill.on{border-color:var(--terra);color:var(--terra);background:var(--terra-soft);}

/* ── TABS ── */
.tabs-row{display:flex;gap:0;border-bottom:none;}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:600;letter-spacing:.05em;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.on{color:var(--text);border-bottom-color:var(--terra);}

/* ── MAIN ── */
.page{max-width:680px;margin:0 auto;padding:24px 20px;}

/* ── FAB (floating action button) ── */
.fab{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;align-items:center;gap:10px;padding:14px 22px;background:var(--terra);color:#111;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:28px;cursor:pointer;box-shadow:0 4px 24px rgba(222,122,88,.4);transition:all .2s;letter-spacing:.02em;}
.fab:hover{background:#c96840;transform:translateY(-2px);box-shadow:0 6px 28px rgba(222,122,88,.5);}
.fab:active{transform:translateY(0);}
.fab-icon{font-size:18px;font-weight:400;}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.wnav-btn{width:34px;height:34px;border:1px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:all .15s;}
.wnav-btn:hover{border-color:var(--terra);color:var(--terra);}
.week-label{font-size:15px;font-weight:700;color:var(--text);flex:1;}

/* ── STATS CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.stat-num{font-size:32px;font-weight:300;color:var(--text);line-height:1;margin-bottom:4px;}
.stat-num.active{color:var(--terra);}
.stat-num.done{color:var(--green-text);}
.stat-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);}

/* ── DAY SECTION ── */
.day-section{margin-bottom:8px;}
.day-label{display:flex;align-items:center;gap:10px;padding:16px 0 10px;}
.day-date{font-size:16px;font-weight:700;color:var(--text);}
.day-dow{font-size:12px;font-weight:600;color:var(--text4);letter-spacing:.05em;}
.now-badge{background:var(--terra);color:#111;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:10px;}

/* ── TASK CARD ── */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;transition:border-color .15s;}
.task-card:hover{border-color:var(--border2);}
.task-card.is-done{background:var(--green-soft);border-color:var(--green);}

.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.tc-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.3;}
.task-card.is-done .tc-name{color:var(--green-text);font-weight:600;}

.done-chip{display:flex;align-items:center;gap:5px;background:var(--green-soft);border:1px solid var(--green);color:var(--green-text);font-size:11px;font-weight:700;padding:4px 12px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.pct-chip{font-size:12px;font-weight:700;padding:4px 12px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.pct-high{color:var(--terra);background:var(--terra-soft);}
.pct-mid{color:#c8a050;background:rgba(200,160,80,.15);}
.pct-low{color:var(--text3);background:var(--card2);}

/* meta pills */
.tc-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.meta-pill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--text2);background:var(--card2);border:1px solid var(--border);padding:5px 12px;border-radius:10px;white-space:nowrap;}
.meta-pill.who{color:var(--text);}
.meta-pill .pill-icon{font-size:13px;}

/* deadline pill */
.deadline-pill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 12px;border-radius:10px;white-space:nowrap;}
.deadline-pill.urgent{color:#e07070;background:rgba(224,112,112,.12);border:1px solid rgba(224,112,112,.25);}
.deadline-pill.normal{color:var(--text2);background:var(--card2);border:1px solid var(--border);}

/* ── TZ BLOCK ── */
.tz-block{background:var(--card2);border-radius:10px;padding:12px 14px;margin-bottom:12px;border-left:3px solid var(--terra);}
.tz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tz-title{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--terra);}
.tz-edit-btn{font-size:11px;font-weight:700;color:var(--text4);background:none;border:none;cursor:pointer;padding:2px 8px;border-radius:6px;transition:all .15s;font-family:'Inter',sans-serif;}
.tz-edit-btn:hover{color:var(--text2);background:var(--border);}
.tz-content{font-size:13px;font-weight:400;color:var(--text2);line-height:1.65;}
.tz-content a{color:var(--terra);text-decoration:none;}
.tz-content a:hover{text-decoration:underline;}
.tz-empty{font-size:13px;color:var(--text4);font-style:italic;}
.tz-textarea{width:100%;background:var(--card);border:1.5px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px 12px;border-radius:8px;resize:vertical;min-height:70px;outline:none;line-height:1.6;margin-top:4px;}
.tz-textarea:focus{border-color:var(--terra);}
.tz-edit-row{display:flex;gap:8px;margin-top:8px;}
.btn-save{padding:7px 18px;font-size:12px;font-weight:700;border:none;background:var(--terra);color:#111;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-save:hover{background:#c96840;}
.btn-cancel{padding:7px 14px;font-size:12px;font-weight:600;border:1px solid var(--border2);background:none;color:var(--text3);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cancel:hover{color:var(--text2);}

/* ── COMPLETION BLOCK ── */
.completion-block{border-top:1px solid var(--border);padding-top:12px;}
.comp-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text4);margin-bottom:8px;}
.comp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dt-input{background:var(--card2);border:1.5px solid var(--border2);color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:8px 12px;border-radius:10px;outline:none;transition:border-color .15s;flex:1;min-width:180px;}
.dt-input:hover,.dt-input:focus{border-color:var(--terra);}
.btn-done{padding:9px 20px;font-size:13px;font-weight:700;border:none;background:var(--green);color:#fff;border-radius:10px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-done:hover{background:#4d6b61;}
.done-info{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--green-text);}
.done-info .undo{font-size:12px;font-weight:500;color:var(--text4);cursor:pointer;text-decoration:underline;margin-left:4px;}
.done-info .undo:hover{color:var(--text3);}

/* ── OVERVIEW ── */
.ov-info{background:var(--green-soft);border:1px solid var(--green);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:13px;font-weight:500;color:var(--green-text);line-height:1.6;}
.ov-day{margin-bottom:16px;}
.ov-day-head{display:flex;align-items:center;gap:10px;padding:14px 0 10px;border-bottom:1px solid var(--border);}
.ov-day-label{font-size:15px;font-weight:700;color:var(--text);}
.ov-status{font-size:11px;font-weight:700;padding:4px 12px;border-radius:10px;margin-left:auto;}
.ov-status.busy{color:var(--terra);background:var(--terra-soft);}
.ov-status.free{color:var(--green-text);background:var(--green-soft);}

.ov-person-row{display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);}
.ov-person-row:last-child{border-bottom:none;}
.ov-person-name{font-size:13px;font-weight:700;color:var(--text2);min-width:84px;padding-top:2px;}
.ov-tasks-list{display:flex;flex-direction:column;gap:5px;flex:1;}
.ov-task-item{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;}
.ov-task-item.done{color:var(--green-text);}
.ov-task-item .ov-pct{font-size:11px;font-weight:700;color:var(--terra);margin-left:6px;background:var(--terra-soft);padding:1px 7px;border-radius:6px;}

/* ── MODAL (assign form) ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6;font-weight:400;}
.field-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.field-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.field-input,.field-select,.field-textarea{background:var(--card2);border:1.5px solid var(--border2);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;font-weight:400;padding:13px 16px;border-radius:12px;outline:none;transition:border-color .15s;width:100%;}
.field-input::placeholder,.field-textarea::placeholder{color:var(--text4);}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--terra);}
.field-select{cursor:pointer;}
.field-textarea{resize:vertical;min-height:100px;line-height:1.6;}
.modal-submit{width:100%;padding:16px;font-size:15px;font-weight:700;border:none;background:var(--terra);color:#111;border-radius:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:all .15s;}
.modal-submit:hover{background:#c96840;}
.modal-ok{display:none;background:var(--green-soft);border:1px solid var(--green);color:var(--green-text);font-size:14px;font-weight:600;padding:14px;border-radius:12px;text-align:center;margin-top:14px;}
.modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border:1px solid var(--border2);background:none;color:var(--text3);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}

/* ── ASSIGNED LIST ── */
.assigned-section{margin-top:32px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);margin-bottom:12px;}
.assigned-card{background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--terra);border-radius:0 12px 12px 0;padding:14px 16px;margin-bottom:10px;position:relative;}
.ac-who{font-size:11px;font-weight:700;color:var(--terra);text-transform:capitalize;margin-bottom:4px;letter-spacing:.05em;}
.ac-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.ac-tz{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:5px;}
.ac-link a{font-size:13px;color:var(--terra);text-decoration:none;font-weight:600;}
.ac-when{font-size:12px;color:var(--text4);font-weight:500;margin-top:6px;}
.ac-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:6px;transition:all .15s;}
.ac-del:hover{color:#e07070;background:rgba(224,112,112,.1);}

/* ── EMPTY ── */
.empty-state{padding:60px 0;text-align:center;}
.empty-line{width:20px;height:2px;background:var(--terra);margin:0 auto 16px;border-radius:1px;}
.empty-text{font-size:14px;font-weight:500;color:var(--text4);line-height:1.8;}

/* ── ERROR ── */
.err-bar{background:var(--terra-soft);border:1px solid var(--terra);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:600;color:var(--terra);display:none;}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .topbar{padding:14px 16px 0;}
  .page{padding:20px 16px;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .stat-card:last-child{grid-column:1/-1;}
  .stat-num{font-size:28px;}
  .tab-btn{padding:10px 12px;font-size:11px;}
  .fab{right:16px;bottom:20px;padding:13px 18px;font-size:13px;}
}
</style>
</head>

var DATA=FB.slice(), person=null, curTab='my', myOff=0, ovOff=0;
var today=new Date(); today.setHours(0,0,0,0);

/* ====== STORAGE ====== */
function lsGet(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsJSON(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
function lsJSONSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function tKey(name,exec){return 't::'+name+'::'+exec;}
function getTD(name,exec){return lsJSON(tKey(name,exec))||{done:false,eta:'',tz:'',localPct:null};}
function setTD(name,exec,obj){lsJSONSet(tKey(name,exec),obj);}
function getAsgn(){return lsJSON('idealist_asgn')||[];}
function setAsgn(a){lsJSONSet('idealist_asgn',a);}

/* ====== UTILS ====== */
function pd(s){if(!s)return null;var p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}
function onDay(t,d){
  var s=pd(t.start),e=pd(t.end);if(!s||!e)return false;
  var dd=new Date(d);dd.setHours(0,0,0,0);return dd>=s&&dd<=e;
}
function fmtD(d){return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});}
function fmtShort(d){return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}
function fmtDT(s){
  if(!s)return '';
  var d=new Date(s);
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})
    +' в '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function daysLeft(endStr){
  var e=pd(endStr);if(!e)return 999;
  var diff=Math.round((e-today)/86400000);
  return diff;
}

function wkDays(off){
  var b=new Date(today);b.setDate(b.getDate()+off*7);
  var dow=b.getDay()===0?6:b.getDay()-1;
  var mon=new Date(b);mon.setDate(b.getDate()-dow);
  var r=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);r.push(d);}
  return r;
}
function getExecs(){
  var s={};
  DATA.forEach(function(t){t.exec.trim().split(/\s+/).forEach(function(n){if(n.length>1)s[n.toLowerCase()]=1;});});
  return Object.keys(s).sort();
}

/* ====== REFRESH ====== */
function doRefresh(){
  var btn=document.getElementById('rbtn');btn.classList.add('spin');
  if(AKEY!=='ВСТАВЬТЕ_ВАШ_API_KEY_ЗДЕСЬ'){
    fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SID+'/values/'+encodeURIComponent(SNAME+'!A7:K300')+'?key='+AKEY)
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(js){
      DATA=(js.values||[]).filter(function(r){return r[0]&&r[1];}).map(function(r){
        var ex=(r[3]||'').trim().toLowerCase().replace(/\bюля\b/g,'').replace(/\bландграф\b/g,'владимир').replace(/\s+/g,' ').trim();
        return{name:(r[1]||'').trim().toLowerCase(),exec:ex,start:(r[5]||'').trim(),end:(r[7]||'').trim(),pct:parseInt((r[8]||'0').replace('%',''))||0,tz:(r[9]||'').trim()};
      }).filter(function(t){return t.exec;});
      mergeAssigned();
      document.getElementById('err-bar').style.display='none';
    }).catch(function(){DATA=FB.slice();mergeAssigned();document.getElementById('err-bar').style.display='block';})
    .finally(function(){btn.classList.remove('spin');buildPersons();render();});
  } else {mergeAssigned();btn.classList.remove('spin');buildPersons();render();}
}

function mergeAssigned(){
  getAsgn().forEach(function(item){
    var exists=DATA.some(function(t){return t.name===item.name.toLowerCase()&&t.exec===item.exec;});
    if(!exists) DATA.push({name:item.name.toLowerCase(),exec:item.exec,start:item.start,end:item.end,pct:0,tz:(item.tz||'')+(item.link?' '+item.link:'')});
  });
}

/* ====== INIT ====== */
window.onload=function(){
  document.getElementById('hdr-date').textContent=today.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
  setTimeout(function(){
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    mergeAssigned();buildPersons();render();
  },1800);
};

/* ====== PERSONS ====== */
function buildPersons(){
  var row=document.getElementById('persons-row');row.innerHTML='';
  var a=document.createElement('button');
  a.className='person-pill'+(person===null?' on':'');a.textContent='Все';
  a.onclick=function(){pickPerson(null);};row.appendChild(a);
  getExecs().forEach(function(nm){
    var b=document.createElement('button');
    b.className='person-pill'+(person===nm?' on':'');b.setAttribute('data-p',nm);b.textContent=cap(nm);
    b.onclick=function(){pickPerson(nm);};row.appendChild(b);
  });
  /* update modal select */
  var sel=document.getElementById('f-exec');
  if(sel){sel.innerHTML=getExecs().map(function(e){return '<option value="'+e+'">'+cap(e)+'</option>';}).join('');}
}
function pickPerson(nm){
  person=nm;myOff=0;
  document.querySelectorAll('#persons-row .person-pill').forEach(function(c){c.classList.remove('on');});
  var t=nm===null?document.querySelector('#persons-row .person-pill'):document.querySelector('#persons-row .person-pill[data-p="'+nm+'"]');
  if(t)t.classList.add('on');render();
}

/* ====== TABS ====== */
function sw(t){
  curTab=t;
  ['my','ov'].forEach(function(k){
    document.getElementById('tab-'+k).classList.toggle('on',k===t);
    document.getElementById('v-'+k).style.display=k===t?'block':'none';
  });render();
}
function render(){if(curTab==='my')renderMy();else renderOv();}

/* ====== TZ edit ====== */
function tzEdit(tk){
  var v=document.getElementById('tz-v-'+tk),e=document.getElementById('tz-e-'+tk);
  if(v)v.style.display='none';if(e)e.style.display='block';
}
function tzCancel(tk){
  var v=document.getElementById('tz-v-'+tk),e=document.getElementById('tz-e-'+tk);
  if(v)v.style.display='block';if(e)e.style.display='none';
}
function tzSave(name,exec,tk){
  var area=document.getElementById('tz-a-'+tk);if(!area)return;
  var val=area.value.trim();
  var td=getTD(name,exec);td.tz=val;setTD(name,exec,td);
  DATA.forEach(function(t){if(t.name===name&&t.exec===exec)t.tz=val;});
  var v=document.getElementById('tz-v-'+tk);
  if(v){
    if(val){var isL=val.indexOf('http')===0;v.innerHTML='<div class="tz-content">'+(isL?'<a href="'+esc(val)+'" target="_blank">'+esc(val)+'</a>':esc(val))+'</div>';}
    else{v.innerHTML='<div class="tz-empty">не указано — нажмите редактировать</div>';}
  }
  tzCancel(tk);
}

/* ====== COMPLETE ====== */
function markDone(name,exec,tk){
  var inp=document.getElementById('eta-'+tk);
  var eta=inp?inp.value:'';
  var td=getTD(name,exec);td.done=true;td.eta=eta;setTD(name,exec,td);
  DATA.forEach(function(t){if(t.name===name&&t.exec===exec)t.pct=100;});
  renderMy();
}
function undoDone(name,exec){
  var td=getTD(name,exec);td.done=false;setTD(name,exec,td);
  DATA.forEach(function(t){if(t.name===name&&t.exec===exec)t.pct=0;});
  renderMy();
}

/* ====== MY TASKS ====== */
function renderMy(){
  var c=document.getElementById('v-my');
  var days=wkDays(myOff);
  var byD=days.map(function(day){
    return{day:day,tasks:DATA.filter(function(t){
      if(!onDay(t,day))return false;
      if(!person)return true;
      return t.exec.trim().split(/\s+/).indexOf(person)>=0;
    })};
  });
  var all=[];byD.forEach(function(d){all=all.concat(d.tasks);});
  var iw=all.filter(function(t){return t.pct<100;});
  var dn=all.filter(function(t){return t.pct===100;});
  var wl=fmtShort(days[0])+' \u2014 '+fmtShort(days[6]);

  var h='<div class="stats-row">'
    +'<div class="stat-card"><div class="stat-num">'+all.length+'</div><div class="stat-label">задач за неделю</div></div>'
    +'<div class="stat-card"><div class="stat-num active">'+iw.length+'</div><div class="stat-label">в работе сейчас</div></div>'
    +'<div class="stat-card"><div class="stat-num done">'+dn.length+'</div><div class="stat-label">выполнено за неделю</div></div>'
    +'</div>'
    +'<div class="week-nav">'
    +'<button class="wnav-btn" onclick="myOff--;renderMy()">&#8592;</button>'
    +'<div class="week-label">'+wl+'</div>'
    +'<button class="wnav-btn" onclick="myOff++;renderMy()">&#8594;</button>'
    +'</div>';

  var any=false;
  byD.forEach(function(item){
    if(!item.tasks.length)return;any=true;
    var day=item.day,tasks=item.tasks;
    var isT=day.getTime()===today.getTime();
    var act=tasks.filter(function(t){return t.pct<100;});
    var dnt=tasks.filter(function(t){return t.pct===100;});

    h+='<div class="day-section"><div class="day-label">'
      +'<span class="day-date">'+fmtD(day)+'</span>'
      +'<span class="day-dow">'+day.toLocaleDateString('ru-RU',{weekday:'long'})+'</span>'
      +(isT?'<span class="now-badge">сегодня</span>':'')
      +'</div>';

    act.concat(dnt).forEach(function(t,idx){
      var isDone=t.pct===100;
      var tk=day.getTime()+'-'+idx;
      var td=getTD(t.name,t.exec);
      var tzVal=td.tz||t.tz||'';
      var ex=t.exec.trim().split(/\s+/).filter(function(x){return x.length>1;}).map(cap).join(', ');

      /* badge */
      var badge='';
      if(isDone){badge='<span class="done-chip">&#10003; Выполнено</span>';}
      else if(t.pct>=70){badge='<span class="pct-chip pct-high">'+t.pct+'%</span>';}
      else if(t.pct>=30){badge='<span class="pct-chip pct-mid">'+t.pct+'%</span>';}
      else{badge='<span class="pct-chip pct-low">'+t.pct+'%</span>';}

      /* deadline */
      var dl=daysLeft(t.end);
      var dlText='';
      if(!isDone){
        if(dl<0){dlText='просрочено';}
        else if(dl===0){dlText='сдать сегодня!';}
        else if(dl===1){dlText='сдать завтра';}
        else{dlText='сдать '+fmtD(pd(t.end));}
        var dlClass=dl<=1?'urgent':'normal';
        var dlPill='<span class="deadline-pill '+dlClass+'">&#128339; '+dlText+'</span>';
      } else {dlPill='';}

      /* exec pill (only if showing all) */
      var execPill=!person?'<span class="meta-pill who">&#128100; '+ex+'</span>':'';

      /* tz block */
      var tzHtml='';
      if(tzVal){var isL=tzVal.indexOf('http')===0;tzHtml='<div class="tz-content">'+(isL?'<a href="'+esc(tzVal)+'" target="_blank">'+esc(tzVal)+'</a>':esc(tzVal))+'</div>';}
      else{tzHtml='<div class="tz-empty">не указано — нажмите редактировать</div>';}

      /* completion block */
      var compHtml='';
      if(!isDone){
        compHtml='<div class="completion-block">'
          +'<div class="comp-label">Когда вы сделаете?</div>'
          +'<div class="comp-row">'
          +'<input class="dt-input" type="datetime-local" id="eta-'+tk+'">'
          +'<button class="btn-done" onclick="markDone(\''+esc(t.name)+'\',\''+esc(t.exec)+'\',\''+tk+'\')">Готово &#10003;</button>'
          +'</div></div>';
      } else {
        var etaStr=td.eta?fmtDT(td.eta):'';
        compHtml='<div class="completion-block">'
          +'<div class="done-info">&#10003; Выполнено'+(etaStr?' '+etaStr:'')
          +'<span class="undo" onclick="undoDone(\''+esc(t.name)+'\',\''+esc(t.exec)+'\')">отменить</span>'
          +'</div></div>';
      }

      h+='<div class="task-card'+(isDone?' is-done':'')+'">'
        +'<div class="tc-top"><div class="tc-name">'+cap(t.name)+'</div>'+badge+'</div>'
        +'<div class="tc-meta">'+execPill+dlPill+'</div>'
        +'<div class="tz-block">'
        +'<div class="tz-header"><span class="tz-title">ТЗ и макет</span>'
        +'<button class="tz-edit-btn" onclick="tzEdit(\''+tk+'\')">&#9998; Редактировать</button></div>'
        +'<div id="tz-v-'+tk+'">'+tzHtml+'</div>'
        +'<div id="tz-e-'+tk+'" style="display:none">'
        +'<textarea class="tz-textarea" id="tz-a-'+tk+'">'+esc(tzVal)+'</textarea>'
        +'<div class="tz-edit-row">'
        +'<button class="btn-save" onclick="tzSave(\''+esc(t.name)+'\',\''+esc(t.exec)+'\',\''+tk+'\')">Сохранить</button>'
        +'<button class="btn-cancel" onclick="tzCancel(\''+tk+'\')">Отмена</button>'
        +'</div></div></div>'
        +compHtml
        +'</div>';
    });
    h+='</div>';
  });

  if(!any) h+='<div class="empty-state"><div class="empty-line"></div><div class="empty-text">Нет задач на эту неделю'+(person?' \u00b7 '+cap(person):'')+'</div></div>';
  c.innerHTML=h;
}

/* ====== OVERVIEW ====== */
function renderOv(){
  var c=document.getElementById('v-ov');
  var days=wkDays(ovOff);
  var wl=fmtShort(days[0])+' \u2014 '+fmtShort(days[6]);

  var h='<div class="ov-info">Эта вкладка для менеджеров и руководителя. Здесь видно кто чем занят в каждый день и насколько загружено производство.</div>'
    +'<div class="week-nav">'
    +'<button class="wnav-btn" onclick="ovOff--;renderOv()">&#8592;</button>'
    +'<div class="week-label">'+wl+'</div>'
    +'<button class="wnav-btn" onclick="ovOff++;renderOv()">&#8594;</button>'
    +'</div>';

  var any=false;
  days.forEach(function(day){
    var isT=day.getTime()===today.getTime();
    var dt=DATA.filter(function(t){return onDay(t,day);});
    if(!dt.length)return;any=true;
    var byE={};
    dt.forEach(function(t){
      t.exec.trim().split(/\s+/).filter(function(x){return x.length>1;}).forEach(function(p){
        var k=p.toLowerCase();if(!byE[k])byE[k]=[];byE[k].push(t);
      });
    });
    var iw=dt.filter(function(t){return t.pct<100;}).length;
    h+='<div class="ov-day"><div class="ov-day-head">'
      +'<span class="ov-day-label">'+fmtD(day)+', '+day.toLocaleDateString('ru-RU',{weekday:'long'})+'</span>'
      +(isT?'<span class="now-badge">сегодня</span>':'')
      +(iw>0?'<span class="ov-status busy">'+iw+' в работе</span>':'<span class="ov-status free">все готово</span>')
      +'</div>';
    Object.keys(byE).sort().forEach(function(ex){
      var ts=byE[ex];
      h+='<div class="ov-person-row"><div class="ov-person-name">'+cap(ex)+'</div><div class="ov-tasks-list">';
      ts.forEach(function(t){
        h+='<div class="ov-task-item'+(t.pct===100?' done':'')+'">'
          +cap(t.name)
          +(!isDoneT(t)&&t.pct>0?'<span class="ov-pct">'+t.pct+'%</span>':'')
          +'</div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  });
  if(!any) h+='<div class="empty-state"><div class="empty-line"></div><div class="empty-text">Нет задач на эту неделю</div></div>';
  c.innerHTML=h;
}
function isDoneT(t){return t.pct===100;}

/* ====== MODAL ====== */
function openModal(){
  /* update select */
  var sel=document.getElementById('f-exec');
  if(sel)sel.innerHTML=getExecs().map(function(e){return '<option value="'+e+'">'+cap(e)+'</option>';}).join('');
  renderAssignedList();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function maybeClose(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function renderAssignedList(){
  var arr=getAsgn();
  var c=document.getElementById('modal-assigned');
  if(!arr.length){c.innerHTML='';return;}
  var h='<div class="section-title">Поставленные задачи ('+arr.length+')</div>';
  arr.forEach(function(item,i){
    h+='<div class="assigned-card">'
      +'<button class="ac-del" onclick="delAsgn('+i+')" title="Удалить">&#10005;</button>'
      +'<div class="ac-who">'+cap(esc(item.exec))+'</div>'
      +'<div class="ac-name">'+esc(item.name)+'</div>'
      +(item.tz?'<div class="ac-tz">'+esc(item.tz)+'</div>':'')
      +(item.link?'<div class="ac-link"><a href="'+esc(item.link)+'" target="_blank">'+esc(item.link)+'</a></div>':'')
      +'<div class="ac-when">Сдать до: '+esc(item.endLabel||item.end)+'</div>'
      +'</div>';
  });
  c.innerHTML=h;
}

function submitTask(){
  var exec=document.getElementById('f-exec').value;
  var name=document.getElementById('f-name').value.trim();
  var tz=document.getElementById('f-tz').value.trim();
  var link=document.getElementById('f-link').value.trim();
  var endDT=document.getElementById('f-end').value;
  if(!name){document.getElementById('f-name').focus();return;}
  if(!endDT){document.getElementById('f-end').focus();return;}

  var endDate=new Date(endDT);
  var endDD=(endDate.getDate()<10?'0':'')+endDate.getDate();
  var endMM=((endDate.getMonth()+1)<10?'0':'')+(endDate.getMonth()+1);
  var endYY=endDate.getFullYear();
  var endFmt=endDD+'/'+endMM+'/'+endYY;
  var endLabel=fmtDT(endDT);

  var now=new Date();
  var dd=(now.getDate()<10?'0':'')+now.getDate();
  var mm=((now.getMonth()+1)<10?'0':'')+(now.getMonth()+1);
  var startFmt=dd+'/'+mm+'/'+now.getFullYear();

  DATA.push({name:name.toLowerCase(),exec:exec,start:startFmt,end:endFmt,pct:0,
    tz:(tz+(link?' '+link:'')).trim()});

  var arr=getAsgn();
  arr.push({exec:exec,name:name,tz:tz,link:link,start:startFmt,end:endFmt,endLabel:endLabel});
  setAsgn(arr);

  /* clear form */
  document.getElementById('f-name').value='';
  document.getElementById('f-tz').value='';
  document.getElementById('f-link').value='';
  document.getElementById('f-end').value='';

  var ok=document.getElementById('modal-ok');ok.style.display='block';
  setTimeout(function(){ok.style.display='none';},2500);
  renderAssignedList();
  buildPersons();
}

function delAsgn(i){
  var arr=getAsgn();
  var item=arr[i];
  if(item){DATA=DATA.filter(function(t){return !(t.name===item.name.toLowerCase()&&t.exec===item.exec);});}
  arr.splice(i,1);setAsgn(arr);
  renderAssignedList();render();
}
</script>
