<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>idealist · план производства</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #181818;
    --bg2:        #1f1f1f;
    --bg3:        #272727;
    --line:       #2e2e2e;
    --line2:      #383838;
    --terracotta: #de7a58;
    --terracotta2:#c96840;
    --green:      #3f574f;
    --silver:     #cbc9c9;
    --muted:      #888;
    --dim:        #555;
    --white:      #f2efe9;
    --white2:     #c8c4bc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ========== LOADING ========== */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 40px;
  }

  .loader-logo svg { width: clamp(160px, 30vw, 240px); }

  .loader-line {
    width: 80px; height: 1px;
    background: var(--line2);
    position: relative;
    overflow: hidden;
  }
  .loader-line::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--terracotta);
    transform: translateX(-100%);
    animation: loader 1.4s ease forwards;
  }
  @keyframes loader { to { transform: translateX(0); } }

  .loader-text {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    font-weight: 400;
    margin-top: -24px;
  }

  /* ========== APP ========== */
  #app { display: none; }

  /* ========== HEADER ========== */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }

  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    padding: 18px 32px 0;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  /* Logo SVG inline */
  .logo-link { display: flex; flex-direction: column; gap: 5px; text-decoration: none; }
  .logo-svg { height: clamp(22px, 3vw, 30px); width: auto; }
  .logo-sub {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }

  .today-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    font-weight: 300;
  }

  .icon-btn {
    width: 30px; height: 30px;
    border: 1px solid var(--line2);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .icon-btn.spin { animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* chips */
  .chips-wrap { display: flex; gap: 6px; flex-wrap: wrap; padding-bottom: 14px; }

  .chip {
    padding: 5px 13px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    border: 1px solid var(--line2);
    background: none;
    color: var(--muted);
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--muted); color: var(--white2); }
  .chip.active { border-color: var(--white2); color: var(--white); background: var(--bg3); }
  .chip.active-terra { border-color: var(--terracotta); color: var(--terracotta); background: rgba(222,122,88,0.06); }

  /* tabs */
  .tabs-wrap { display: flex; }
  .tab-btn {
    padding: 9px 18px;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer; border: none; background: none;
    color: var(--dim);
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .tab-btn:hover { color: var(--white2); }
  .tab-btn.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }

  /* ========== MAIN ========== */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 32px 80px;
  }

  /* ========== DATE NAV ========== */
  .nav-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
  }

  .nav-arr {
    width: 30px; height: 30px;
    border: 1px solid var(--line2);
    background: none; color: var(--muted);
    cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; border-radius: 2px;
  }
  .nav-arr:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .nav-range {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300;
    color: var(--white2);
    letter-spacing: 0.04em;
    flex: 1;
  }

  /* ========== STATS ========== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    margin-bottom: 36px;
  }

  .stat-cell {
    background: var(--bg);
    padding: 22px 24px;
  }

  .stat-n {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px; font-weight: 300;
    color: var(--white);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-n.accent { color: var(--terracotta); }

  .stat-l {
    font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--dim);
  }

  /* ========== SECTION HEAD ========== */
  .sec-head {
    display: flex; align-items: baseline;
    gap: 10px; padding: 12px 0 11px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 0; margin-top: 28px;
  }
  .sec-head:first-of-type { margin-top: 0; }

  .sec-day {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 300;
    color: var(--white2);
    letter-spacing: 0.03em;
  }

  .sec-dow {
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--dim);
    font-weight: 400;
  }

  .today-mark {
    font-size: 9px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--terracotta);
    border: 1px solid var(--terracotta);
    padding: 2px 7px; border-radius: 1px;
    font-weight: 500;
  }

  .sec-count {
    font-size: 10px; color: var(--dim);
    margin-left: auto; letter-spacing: 0.05em;
  }

  /* ========== TASK ROW ========== */
  .task-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    align-items: center;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
    gap: 4px;
    transition: padding 0.1s;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { padding: 13px 6px; background: rgba(255,255,255,0.015); margin: 0 -6px; }

  .task-row.done .t-title { color: var(--dim); text-decoration: line-through; }
  .task-row.done .t-meta  { color: var(--dim); }

  .t-num {
    font-size: 10px; color: var(--line2);
    font-weight: 500; letter-spacing: 0.05em;
  }

  .t-body { min-width: 0; }

  .t-title {
    font-size: 14px; font-weight: 400;
    color: var(--white); margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.01em;
  }

  .t-meta {
    display: flex; flex-wrap: wrap; gap: 10px;
    align-items: center;
  }

  .t-meta span {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.04em; font-weight: 300;
  }
  .t-meta .exec { color: var(--white2); }

  .pct {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.08em; padding: 3px 10px;
    border-radius: 1px; white-space: nowrap;
  }
  .p100 { color: var(--dim);         background: rgba(255,255,255,0.04); }
  .p70  { color: var(--terracotta);  background: rgba(222,122,88,0.10); }
  .p30  { color: #c8a050;            background: rgba(200,160,80,0.10); }
  .p0   { color: #b06060;            background: rgba(176,96,96,0.10); }

  /* ========== OVERVIEW ========== */
  .ov-block { margin-bottom: 20px; }

  .ov-head {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 0; border-bottom: 1px solid var(--line);
  }

  .ov-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 300;
    color: var(--white2); letter-spacing: 0.03em;
  }

  .ov-inwork {
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--terracotta);
    margin-left: auto;
  }

  .ov-grid {
    display: grid;
    grid-template-columns: 88px 1fr;
  }

  .ov-name {
    padding: 10px 0 10px;
    border-bottom: 1px solid var(--line);
    font-size: 11px; font-weight: 400;
    color: var(--muted); letter-spacing: 0.06em;
    text-transform: capitalize;
    display: flex; align-items: flex-start;
    padding-top: 13px;
  }

  .ov-tasks {
    padding: 10px 0 10px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 3px;
  }

  .ov-task {
    font-size: 13px; font-weight: 300;
    color: var(--white); line-height: 1.55;
    letter-spacing: 0.01em;
  }
  .ov-task.done { color: var(--dim); text-decoration: line-through; }

  /* ========== EMPTY ========== */
  .empty {
    padding: 80px 0; text-align: center;
  }
  .empty-rule {
    width: 32px; height: 1px;
    background: var(--terracotta);
    margin: 0 auto 24px;
  }
  .empty-t {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 300;
    color: var(--dim); letter-spacing: 0.04em;
    line-height: 1.8;
  }

  /* error */
  .err-bar {
    border: 1px solid rgba(222,122,88,0.3);
    background: rgba(222,122,88,0.07);
    padding: 10px 14px; margin-bottom: 20px;
    font-size: 11px; color: var(--terracotta);
    letter-spacing: 0.04em; display: none;
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 640px) {
    .header-inner { padding: 14px 18px 0; }
    main { padding: 24px 18px 60px; }
    .logo-svg { height: 20px; }
    .today-label { display: none; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .stat-cell:last-child { grid-column: 1/-1; }
    .stat-n { font-size: 32px; }
    .stat-cell { padding: 16px; }
    .nav-range { font-size: 15px; }
    .task-row { grid-template-columns: 28px 1fr auto; }
    .t-title { font-size: 13px; }
    .ov-grid { grid-template-columns: 72px 1fr; }
    .tab-btn { padding: 9px 12px; font-size: 9px; }
    .chips-wrap { gap: 5px; }
    .chip { padding: 5px 10px; font-size: 10px; }
  }

  /* Brand motif decoration */
  .motif {
    position: fixed; bottom: 0; right: 0;
    width: 220px; height: 220px;
    opacity: 0.025; pointer-events: none;
    z-index: 0;
  }
</style>

// ============================================================
//  STATE
// ============================================================
let DATA = [...FALLBACK];
let person = null;
let tab = 'my';
let myOff = 0, ovOff = 0;
const today = new Date(); today.setHours(0,0,0,0);

// ============================================================
//  UTILS
// ============================================================
const parseD = s => { if(!s)return null; const[d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); };
const onDay  = (t,d) => { const s=parseD(t.start),e=parseD(t.end); if(!s||!e)return false; const dd=new Date(d);dd.setHours(0,0,0,0);return dd>=s&&dd<=e; };
const fmtS   = d => d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
const cap    = s => s?s[0].toUpperCase()+s.slice(1):s;

function weekOf(off) {
  const b = new Date(today); b.setDate(b.getDate()+off*7);
  const dow = b.getDay()===0?6:b.getDay()-1;
  const mon = new Date(b); mon.setDate(b.getDate()-dow);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function executors() {
  const s=new Set();
  DATA.forEach(t=>t.exec.trim().split(/\s+/).forEach(n=>{if(n.length>1)s.add(n.toLowerCase());}));
  return [...s].sort();
}

function pctCls(p) {
  if(p>=100)return 'p100'; if(p>=70)return 'p70'; if(p>=30)return 'p30'; return 'p0';
}

// ============================================================
//  LOAD
// ============================================================
async function refreshData() {
  const btn = document.querySelector('.icon-btn');
  btn.classList.add('spin');
  if (API_KEY !== 'ВСТАВЬТЕ_ВАШ_API_KEY_ЗДЕСЬ') {
    try {
      const r = encodeURIComponent(`${SHEET_NAME}!A7:I300`);
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${r}?key=${API_KEY}`;
      const res = await fetch(url); if(!res.ok) throw 0;
      const js = await res.json();
      DATA = (js.values||[]).filter(r=>r[0]&&r[1]).map(r=>({
        n:+r[0]||0, name:(r[1]||'').trim().toLowerCase(),
        exec:(r[3]||'').trim().toLowerCase()
          .replace(/\bюля\b/g,'').replace(/\bландграф\b/g,'владимир')
          .replace(/\s+/g,' ').trim(),
        start:(r[5]||'').trim(), end:(r[7]||'').trim(),
        pct:parseInt((r[8]||'0').replace('%',''))||0,
      })).filter(t=>t.exec);
      document.getElementById('err-bar').style.display='none';
    } catch {
      DATA=[...FALLBACK];
      document.getElementById('err-bar').style.display='block';
    }
  }
  btn.classList.remove('spin');
  buildChips(); render();
}

// ============================================================
//  INIT
// ============================================================
window.onload = () => {
  document.getElementById('today-lbl').textContent =
    today.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='block';
    buildChips(); render();
  }, 1600);
};

// ============================================================
//  CHIPS
// ============================================================
function buildChips() {
  const w = document.getElementById('chips-wrap'); w.innerHTML='';
  const all = document.createElement('button');
  all.className='chip'+(person===null?' active':'');
  all.textContent='Все'; all.onclick=()=>pick(null); w.appendChild(all);
  executors().forEach(nm=>{
    const b=document.createElement('button');
    b.className='chip'+(person===nm?' active':'');
    b.dataset.p=nm; b.textContent=cap(nm); b.onclick=()=>pick(nm); w.appendChild(b);
  });
}

function pick(nm) {
  person=nm; myOff=0;
  document.querySelectorAll('#chips-wrap .chip').forEach(c=>c.classList.remove('active'));
  const t = nm===null
    ? document.querySelector('#chips-wrap .chip')
    : document.querySelector(`#chips-wrap .chip[data-p="${nm}"]`);
  if(t) t.classList.add('active');
  render();
}

// ============================================================
//  TABS
// ============================================================
function switchTab(t) {
  tab=t;
  ['my','ov'].forEach(k=>{
    document.getElementById('tab-'+k).classList.toggle('active',k===t);
    document.getElementById('view-'+k).style.display=k===t?'block':'none';
  });
  render();
}

function render() { tab==='my'?renderMy():renderOv(); }

// ============================================================
//  MY TASKS
// ============================================================
function renderMy() {
  const c = document.getElementById('view-my');
  const days = weekOf(myOff);
  const byDay = days.map(day=>({
    day,
    tasks: DATA.filter(t=>{
      if(!onDay(t,day))return false;
      if(!person)return true;
      return t.exec.trim().split(/\s+/).includes(person);
    })
  }));

  const all=byDay.flatMap(d=>d.tasks);
  const inWork=all.filter(t=>t.pct<100);
  const done=all.filter(t=>t.pct===100);
  const rl=`${fmtS(days[0])} — ${fmtS(days[6])}`;

  let h=`
    <div class="stats-grid">
      <div class="stat-cell"><div class="stat-n">${all.length}</div><div class="stat-l">задач на неделю</div></div>
      <div class="stat-cell"><div class="stat-n accent">${inWork.length}</div><div class="stat-l">в работе</div></div>
      <div class="stat-cell"><div class="stat-n">${done.length}</div><div class="stat-l">выполнено</div></div>
    </div>
    <div class="nav-row">
      <button class="nav-arr" onclick="myOff--;renderMy()">←</button>
      <div class="nav-range">${rl}</div>
      <button class="nav-arr" onclick="myOff++;renderMy()">→</button>
    </div>`;

  let any=false;
  byDay.forEach(({day,tasks})=>{
    if(!tasks.length)return; any=true;
    const isT=day.getTime()===today.getTime();
    const act=tasks.filter(t=>t.pct<100), dn=tasks.filter(t=>t.pct===100);
    h+=`<div class="sec-head">
      <span class="sec-day">${day.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</span>
      <span class="sec-dow">${day.toLocaleDateString('ru-RU',{weekday:'long'})}</span>
      ${isT?'<span class="today-mark">сегодня</span>':''}
      <span class="sec-count">${tasks.length}</span>
    </div>`;
    [...act,...dn].forEach(t=>{
      const dn2=t.pct===100;
      const ex=t.exec.trim().split(/\s+/).filter(x=>x.length>1).map(cap).join(', ');
      h+=`<div class="task-row ${dn2?'done':''}">
        <div class="t-num">#${t.n}</div>
        <div class="t-body">
          <div class="t-title">${cap(t.name)}</div>
          <div class="t-meta">
            ${!person?`<span class="exec">${ex}</span>`:''}
            <span>до ${fmtS(parseD(t.end))}</span>
          </div>
        </div>
        <div class="pct ${pctCls(t.pct)}">${t.pct}%</div>
      </div>`;
    });
  });

  if(!any) h+=`<div class="empty"><div class="empty-rule"></div><div class="empty-t">нет задач на эту неделю${person?` · ${cap(person)}`:''}</div></div>`;
  c.innerHTML=h;
}

// ============================================================
//  OVERVIEW
// ============================================================
function renderOv() {
  const c=document.getElementById('view-ov');
  const days=weekOf(ovOff);
  const rl=`${fmtS(days[0])} — ${fmtS(days[6])}`;

  let h=`<div class="nav-row">
    <button class="nav-arr" onclick="ovOff--;renderOv()">←</button>
    <div class="nav-range">${rl}</div>
    <button class="nav-arr" onclick="ovOff++;renderOv()">→</button>
  </div>`;

  let any=false;
  days.forEach(day=>{
    const isT=day.getTime()===today.getTime();
    const dt=DATA.filter(t=>onDay(t,day));
    if(!dt.length)return; any=true;
    const byE={};
    dt.forEach(t=>t.exec.trim().split(/\s+/).filter(x=>x.length>1).forEach(p=>{
      const k=p.toLowerCase(); if(!byE[k])byE[k]=[]; byE[k].push(t);
    }));
    const iw=dt.filter(t=>t.pct<100).length;
    h+=`<div class="ov-block"><div class="ov-head">
      <span class="ov-date">${day.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'long'})}</span>
      ${isT?'<span class="today-mark">сегодня</span>':''}
      ${iw>0?`<span class="ov-inwork">${iw} в работе</span>`:''}
    </div><div class="ov-grid">`;
    Object.entries(byE).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([ex,ts])=>{
      h+=`<div class="ov-name">${cap(ex)}</div>
      <div class="ov-tasks">${ts.map(t=>`<div class="ov-task ${t.pct===100?'done':''}">${cap(t.name)}</div>`).join('')}</div>`;
    });
    h+=`</div></div>`;
  });

  if(!any) h+=`<div class="empty"><div class="empty-rule"></div><div class="empty-t">нет задач на эту неделю</div></div>`;
  c.innerHTML=h;
}
</script>
