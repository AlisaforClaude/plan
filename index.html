<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>idealist &middot; план</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111;--s1:#181818;--s2:#1f1f1f;--s3:#282828;
  --br:#2c2c2c;--br2:#383838;
  --terra:#de7a58;--terra2:rgba(222,122,88,.12);
  --green:#3f574f;
  --text:#e8e4dc;--text2:#aaa49a;--text3:#666;
  --rad:3px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;font-weight:400;min-height:100vh;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:32px;}
#loading svg{width:clamp(120px,20vw,160px);height:auto;}
.l-bar{width:48px;height:1px;background:var(--br2);position:relative;overflow:hidden;}
.l-bar::after{content:'';position:absolute;inset:0;background:var(--terra);transform:translateX(-100%);animation:lb 1.8s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes lb{to{transform:translateX(0);}}
.l-hint{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-top:-16px;}

/* ── APP ── */
#app{display:none;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--br);}
.hdr{max-width:1040px;margin:0 auto;padding:22px 28px 0;}
.hdr-top{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.logo-block{display:flex;flex-direction:column;gap:7px;align-items:flex-start;}
.logo-block svg{height:clamp(18px,2.4vw,24px);width:auto;display:block;}
.logo-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);font-weight:400;}
.hdr-r{display:flex;align-items:center;gap:14px;}
.hdr-date{font-size:11px;color:var(--text3);font-weight:400;}
.btn-ico{width:28px;height:28px;border:1px solid var(--br2);background:none;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;border-radius:var(--rad);transition:all .15s;}
.btn-ico:hover{border-color:var(--terra);color:var(--terra);}
.btn-ico.spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── PERSON CHIPS ── */
.chips{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:14px;}
.chip{padding:6px 14px;font-size:11px;font-weight:500;letter-spacing:.05em;cursor:pointer;border:1px solid var(--br2);background:none;color:var(--text3);transition:all .15s;font-family:'Inter',sans-serif;border-radius:2px;}
.chip:hover{border-color:var(--text3);color:var(--text2);}
.chip.on{border-color:var(--text);color:var(--text);background:var(--s3);}

/* ── TABS ── */
.tabs{display:flex;}
.tab{padding:10px 18px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Inter',sans-serif;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--terra);border-bottom-color:var(--terra);}

/* ── MAIN ── */
main{max-width:1040px;margin:0 auto;padding:32px 28px 80px;}

/* ── NAV ── */
.dnav{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.darr{width:28px;height:28px;border:1px solid var(--br2);background:none;color:var(--text3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:var(--rad);transition:all .15s;}
.darr:hover{border-color:var(--terra);color:var(--terra);}
.drange{font-size:13px;font-weight:500;color:var(--text2);flex:1;letter-spacing:.03em;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--br);border:1px solid var(--br);margin-bottom:32px;}
.stat{background:var(--bg);padding:20px 20px;}
.sn{font-size:36px;font-weight:300;color:var(--text);line-height:1;margin-bottom:5px;letter-spacing:-.01em;}
.sn.a{color:var(--terra);}
.sl{font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);}

/* ── DAY HEADER ── */
.day-head{display:flex;align-items:center;gap:10px;padding:12px 0 10px;border-bottom:1px solid var(--br);margin-top:28px;}
.day-head:first-of-type{margin-top:0;}
.day-name{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.02em;}
.day-dow{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.today-pill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--terra);border:1px solid var(--terra);padding:2px 8px;border-radius:2px;}
.day-cnt{font-size:10px;color:var(--text3);margin-left:auto;font-weight:500;}

/* ── TASK CARD ── */
.tcard{border-bottom:1px solid var(--br);padding:14px 0;}
.tcard:last-child{border-bottom:none;}
.tcard-top{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;margin-bottom:8px;}
.tname{font-size:14px;font-weight:600;color:var(--text);line-height:1.35;letter-spacing:.01em;}
.tcard.done .tname{color:var(--text3);text-decoration:line-through;font-weight:400;}
.pct{font-size:11px;font-weight:600;letter-spacing:.06em;padding:3px 10px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.p100{color:var(--text3);background:rgba(255,255,255,.05);}
.p70{color:var(--terra);background:var(--terra2);}
.p30{color:#c8a050;background:rgba(200,160,80,.1);}
.p0{color:#c07070;background:rgba(192,112,112,.1);}

/* meta row */
.tmeta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px;}
.mtag{font-size:11px;font-weight:500;color:var(--text3);background:var(--s2);border:1px solid var(--br);padding:3px 10px;border-radius:2px;white-space:nowrap;}
.mtag.exec{color:var(--text2);border-color:var(--br2);}
.mtag.date{color:var(--text2);}

/* TZ / description */
.tdesc{font-size:12px;font-weight:400;color:var(--text2);line-height:1.6;padding:10px 12px;background:var(--s2);border-left:2px solid var(--terra);margin-top:6px;border-radius:0 var(--rad) var(--rad) 0;}
.tdesc a{color:var(--terra);text-decoration:none;}
.tdesc a:hover{text-decoration:underline;}
.tdesc-label{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}

/* deadline picker */
.deadline-row{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.dl-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);}
.dl-input{background:var(--s2);border:1px solid var(--br2);color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;padding:5px 10px;border-radius:var(--rad);cursor:pointer;outline:none;transition:border-color .15s;}
.dl-input:hover,.dl-input:focus{border-color:var(--terra);}
.dl-set{padding:5px 12px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--terra);background:none;color:var(--terra);border-radius:var(--rad);transition:all .15s;font-family:'Inter',sans-serif;}
.dl-set:hover{background:var(--terra);color:#111;}
.dl-saved{font-size:11px;font-weight:500;color:var(--terra);display:flex;align-items:center;gap:5px;}

/* ── OVERVIEW ── */
.ov-block{margin-bottom:16px;}
.ov-head{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--br);}
.ov-date{font-size:13px;font-weight:600;color:var(--text2);}
.ov-iw{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--terra);margin-left:auto;}
.ov-grid{display:grid;grid-template-columns:88px 1fr;}
.ov-name{padding:11px 0 9px;border-bottom:1px solid var(--br);font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:capitalize;}
.ov-tasks{padding:9px 0 9px 14px;border-bottom:1px solid var(--br);display:flex;flex-direction:column;gap:4px;}
.ov-task{font-size:13px;font-weight:400;color:var(--text);line-height:1.5;}
.ov-task.done{color:var(--text3);text-decoration:line-through;}

/* ── ASSIGN FORM ── */
#v-assign{}
.form-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:.01em;}
.form-sub{font-size:12px;color:var(--text3);margin-bottom:28px;font-weight:400;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.fgroup{display:flex;flex-direction:column;gap:7px;}
.fgroup.full{grid-column:1/-1;}
.flabel{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);}
.finput,.fselect,.ftextarea{background:var(--s2);border:1px solid var(--br2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:400;padding:10px 14px;border-radius:var(--rad);outline:none;transition:border-color .15s;width:100%;}
.finput:hover,.finput:focus,.fselect:hover,.fselect:focus,.ftextarea:hover,.ftextarea:focus{border-color:var(--terra);}
.fselect{cursor:pointer;}
.ftextarea{resize:vertical;min-height:90px;line-height:1.6;}
.fsubmit{padding:11px 28px;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border:none;background:var(--terra);color:#111;border-radius:var(--rad);transition:all .15s;font-family:'Inter',sans-serif;margin-top:8px;}
.fsubmit:hover{background:#c96840;}
.fsubmit:active{transform:scale(.98);}
.assigned-list{margin-top:36px;}
.al-title{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.atask{background:var(--s2);border:1px solid var(--br);border-left:2px solid var(--terra);padding:14px 16px;margin-bottom:8px;border-radius:0 var(--rad) var(--rad) 0;}
.at-who{font-size:11px;font-weight:600;color:var(--terra);text-transform:capitalize;margin-bottom:4px;letter-spacing:.04em;}
.at-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;}
.at-tz{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:5px;}
.at-link a{font-size:11px;color:var(--terra);text-decoration:none;font-weight:500;}
.at-link a:hover{text-decoration:underline;}
.at-del{float:right;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:2px;transition:color .15s;}
.at-del:hover{color:#c07070;}
.form-ok{display:none;padding:12px 16px;background:rgba(63,87,79,.25);border:1px solid var(--green);color:#7ab8a8;font-size:12px;font-weight:500;border-radius:var(--rad);margin-top:12px;}

/* ── EMPTY ── */
.empty{padding:72px 0;text-align:center;}
.e-rule{width:24px;height:1px;background:var(--terra);margin:0 auto 20px;}
.e-txt{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:.08em;line-height:2;}

/* ── ERR ── */
.errbar{border:1px solid rgba(222,122,88,.2);background:rgba(222,122,88,.06);padding:10px 14px;margin-bottom:20px;font-size:11px;color:var(--terra);display:none;border-radius:var(--rad);}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .hdr{padding:14px 16px 0;}
  main{padding:20px 16px 60px;}
  .logo-block svg{height:16px;}
  .hdr-date{display:none;}
  .stats{grid-template-columns:1fr 1fr;}
  .stat:last-child{grid-column:1/-1;}
  .sn{font-size:28px;}
  .stat{padding:14px;}
  .form-grid{grid-template-columns:1fr;}
  .fgroup.full{grid-column:1;}
  .ov-grid{grid-template-columns:68px 1fr;}
  .tab{padding:10px 12px;font-size:9px;}
  .chip{padding:5px 10px;font-size:10px;}
}
</style>
</head>

/* deadlines stored in localStorage */
function dlKey(name,exec){return 'dl::'+name+'::'+exec;}
function getDL(name,exec){try{return localStorage.getItem(dlKey(name,exec))||'';}catch(e){return '';}}
function setDL(name,exec,val){try{localStorage.setItem(dlKey(name,exec),val);}catch(e){}}

/* assigned tasks stored in localStorage */
function getAssigned(){try{return JSON.parse(localStorage.getItem('assigned')||'[]');}catch(e){return [];}}
function saveAssigned(arr){try{localStorage.setItem('assigned',JSON.stringify(arr));}catch(e){}}

/* ── utils ── */
function pd(s){if(!s)return null;var p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}
function onDay(t,d){var s=pd(t.start),e=pd(t.end);if(!s||!e)return false;var dd=new Date(d);dd.setHours(0,0,0,0);return dd>=s&&dd<=e;}
function fs(d){return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function pCls(p){if(p>=100)return 'p100';if(p>=70)return 'p70';if(p>=30)return 'p30';return 'p0';}
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

function wkDays(off){
  var b=new Date(today); b.setDate(b.getDate()+off*7);
  var dow=b.getDay()===0?6:b.getDay()-1;
  var mon=new Date(b); mon.setDate(b.getDate()-dow);
  var r=[];
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);r.push(d);}
  return r;
}

function getExecs(){
  var s={};
  DATA.forEach(function(t){t.exec.trim().split(/\s+/).forEach(function(n){if(n.length>1)s[n.toLowerCase()]=1;});});
  return Object.keys(s).sort();
}

/* ── refresh ── */
function doRefresh(){
  var btn=document.getElementById('rbtn'); btn.classList.add('spin');
  if(AKEY!=='ВСТАВЬТЕ_ВАШ_API_KEY_ЗДЕСЬ'){

    fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SID+'/values/'+r+'?key='+AKEY)
    .then(function(res){if(!res.ok)throw 0;return res.json();})
    .then(function(js){
      DATA=(js.values||[]).filter(function(r){return r[0]&&r[1];}).map(function(r){
        var ex=(r[3]||'').trim().toLowerCase()
          .replace(/\bюля\b/g,'').replace(/\bландграф\b/g,'владимир').replace(/\s+/g,' ').trim();
        return{
          name:(r[1]||'').trim().toLowerCase(),exec:ex,
          start:(r[5]||'').trim(),end:(r[7]||'').trim(),
          pct:parseInt((r[8]||'0').replace('%',''))||0,
          tz:(r[9]||'').trim()
        };
      }).filter(function(t){return t.exec;});
      document.getElementById('errbar').style.display='none';
    }).catch(function(){DATA=FB.slice();document.getElementById('errbar').style.display='block';})
    .finally(function(){btn.classList.remove('spin');buildChips();render();});
  } else {btn.classList.remove('spin');buildChips();render();}
}

/* ── chips ── */
function buildChips(){
  var w=document.getElementById('chips'); w.innerHTML='';
  var a=document.createElement('button');
  a.className='chip'+(person===null?' on':''); a.textContent='Все';
  a.onclick=function(){pick(null);}; w.appendChild(a);
  getExecs().forEach(function(nm){
    var b=document.createElement('button');
    b.className='chip'+(person===nm?' on':''); b.setAttribute('data-p',nm); b.textContent=cap(nm);
    b.onclick=function(){pick(nm);}; w.appendChild(b);
  });
}
function pick(nm){
  person=nm; myOff=0;
  document.querySelectorAll('#chips .chip').forEach(function(c){c.classList.remove('on');});
  var t=nm===null?document.querySelector('#chips .chip'):document.querySelector('#chips .chip[data-p="'+nm+'"]');
  if(t)t.classList.add('on'); render();
}

/* ── tabs ── */
function sw(t){
  curTab=t;

    document.getElementById('tab-'+k).classList.toggle('on',k===t);
    document.getElementById('v-'+k).style.display=k===t?'block':'none';
  }); render();
}

function render(){
  if(curTab==='my') renderMy();
  else if(curTab==='ov') renderOv();
  else renderAssign();
}

/* ── save deadline ── */
function saveDL(name,exec,id){
  var inp=document.getElementById(id);
  if(!inp||!inp.value)return;
  setDL(name,exec,inp.value);
  var row=inp.closest('.deadline-row');
  if(row){
    var d=new Date(inp.value);
    var str=d.toLocaleDateString('ru-RU',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
    row.innerHTML='<span class="dl-saved">&#10003; Срок: '+str+'</span>';
  }
}

/* ── MY TASKS ── */
function renderMy(){
  var c=document.getElementById('v-my');
  var days=wkDays(myOff);
  var byD=days.map(function(day){
    return{day:day,tasks:DATA.filter(function(t){
      if(!onDay(t,day))return false;
      if(!person)return true;
      return t.exec.trim().split(/\s+/).indexOf(person)>=0;
    })};
  });
  var all=[]; byD.forEach(function(d){all=all.concat(d.tasks);});
  var iw=all.filter(function(t){return t.pct<100;});
  var dn=all.filter(function(t){return t.pct===100;});
  var rl=fs(days[0])+' — '+fs(days[6]);

  var h='<div class="stats">'
    +'<div class="stat"><div class="sn">'+all.length+'</div><div class="sl">задач на неделю</div></div>'
    +'<div class="stat"><div class="sn a">'+iw.length+'</div><div class="sl">в работе</div></div>'
    +'<div class="stat"><div class="sn">'+dn.length+'</div><div class="sl">выполнено</div></div>'
    +'</div>'
    +'<div class="dnav">'
    +'<button class="darr" onclick="myOff--;renderMy()">&#8592;</button>'
    +'<div class="drange">'+rl+'</div>'
    +'<button class="darr" onclick="myOff++;renderMy()">&#8594;</button>'
    +'</div>';

  var any=false;
  byD.forEach(function(item){
    if(!item.tasks.length)return; any=true;
    var day=item.day, tasks=item.tasks;
    var isT=day.getTime()===today.getTime();
    var act=tasks.filter(function(t){return t.pct<100;});
    var dnt=tasks.filter(function(t){return t.pct===100;});

    h+='<div class="day-head">'
      +'<span class="day-name">'+day.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})+'</span>'
      +'<span class="day-dow">'+day.toLocaleDateString('ru-RU',{weekday:'long'})+'</span>'
      +(isT?'<span class="today-pill">сегодня</span>':'')
      +'<span class="day-cnt">'+tasks.length+'</span>'
      +'</div>';

    act.concat(dnt).forEach(function(t,idx){
      var isDone=t.pct===100;
      var ex=t.exec.trim().split(/\s+/).filter(function(x){return x.length>1;}).map(cap).join(', ');
      var dlId='dl-'+day.getTime()+'-'+idx;
      var savedDL=getDL(t.name,t.exec);

      var dlBlock='';
      if(savedDL){
        var dd=new Date(savedDL);
        var str=dd.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})+' '+dd.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
        dlBlock='<div class="deadline-row"><span class="dl-saved">&#10003; Срок: '+str+'</span></div>';
      } else {
        dlBlock='<div class="deadline-row">'
          +'<span class="dl-label">Срок выполнения</span>'
          +'<input class="dl-input" type="datetime-local" id="'+dlId+'">'
          +'<button class="dl-set" onclick="saveDL(\''+esc(t.name)+'\',\''+esc(t.exec)+'\',\''+dlId+'\')">Сохранить</button>'
          +'</div>';
      }

      var tzBlock='';
      if(t.tz && t.tz.length>5){
        var isLink=t.tz.indexOf('http')===0;
        tzBlock='<div class="tdesc">'
          +'<div class="tdesc-label">ТЗ и макет</div>'
          +(isLink?'<a href="'+esc(t.tz)+'" target="_blank">'+esc(t.tz)+'</a>':esc(t.tz))
          +'</div>';
      } else {
        tzBlock='<div class="tdesc">'
          +'<div class="tdesc-label">ТЗ и макет</div>'
          +'<span style="color:var(--text3);font-style:italic;">не указано</span>'
          +'</div>';
      }

      h+='<div class="tcard'+(isDone?' done':'')+'">'
        +'<div class="tcard-top">'
        +'<div class="tname">'+cap(t.name)+'</div>'
        +'<div class="pct '+pCls(t.pct)+'">'+t.pct+'%</div>'
        +'</div>'
        +'<div class="tmeta">'
        +(!person?'<span class="mtag exec">'+ex+'</span>':'')
        +'<span class="mtag date">'+fs(pd(t.start))+' &rarr; '+fs(pd(t.end))+'</span>'
        +'</div>'
        +tzBlock
        +dlBlock
        +'</div>';
    });
  });

  if(!any) h+='<div class="empty"><div class="e-rule"></div><div class="e-txt">нет задач на эту неделю'+(person?' &middot; '+cap(person):'')+'</div></div>';
  c.innerHTML=h;
}

/* ── OVERVIEW ── */
function renderOv(){
  var c=document.getElementById('v-ov');
  var days=wkDays(ovOff);
  var rl=fs(days[0])+' — '+fs(days[6]);
  var h='<div class="dnav">'
    +'<button class="darr" onclick="ovOff--;renderOv()">&#8592;</button>'
    +'<div class="drange">'+rl+'</div>'
    +'<button class="darr" onclick="ovOff++;renderOv()">&#8594;</button>'
    +'</div>';
  var any=false;
  days.forEach(function(day){
    var isT=day.getTime()===today.getTime();
    var dt=DATA.filter(function(t){return onDay(t,day);});
    if(!dt.length)return; any=true;
    var byE={};
    dt.forEach(function(t){
      t.exec.trim().split(/\s+/).filter(function(x){return x.length>1;}).forEach(function(p){
        var k=p.toLowerCase(); if(!byE[k])byE[k]=[]; byE[k].push(t);
      });
    });
    var iw=dt.filter(function(t){return t.pct<100;}).length;
    h+='<div class="ov-block"><div class="ov-head">'
      +'<span class="ov-date">'+day.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'long'})+'</span>'

      +(iw>0?'<span class="ov-iw">'+iw+' в работе</span>':'')
      +'</div><div class="ov-grid">';
    Object.keys(byE).sort().forEach(function(ex){
      var ts=byE[ex];
      h+='<div class="ov-name">'+cap(ex)+'</div><div class="ov-tasks">';
      ts.forEach(function(t){
        h+='<div class="ov-task'+(t.pct===100?' done':'')+'">'
          +cap(t.name)
          +(t.pct<100?' <span style="font-size:10px;color:var(--terra);font-weight:600;">'+t.pct+'%</span>':'')
          +'</div>';
      });
      h+='</div>';
    });
    h+='</div></div>';
  });
  if(!any) h+='<div class="empty"><div class="e-rule"></div><div class="e-txt">нет задач на эту неделю</div></div>';
  c.innerHTML=h;
}

    +'</div>'
    +'<div class="fgroup">'
    +'<label class="flabel">Дата окончания</label>'
    +'<input class="finput" id="f-end" type="date">'
    +'</div>'
    +'</div>'
    +'<button class="fsubmit" onclick="submitAssign()">Поставить задачу</button>'
    +'<div class="form-ok" id="form-ok">&#10003;&nbsp; Задача поставлена и видна исполнителю</div>'
    + list;
}

function submitAssign(){
  var exec=document.getElementById('f-exec').value;
  var name=document.getElementById('f-name').value.trim();
  var tz=document.getElementById('f-tz').value.trim();
  var link=document.getElementById('f-link').value.trim();
  var start=document.getElementById('f-start').value;
  var end=document.getElementById('f-end').value;
  if(!name){document.getElementById('f-name').focus();return;}
  if(!start||!end){alert('Укажите даты');return;}

  /* add to DATA */
  var fmtDate=function(s){
    if(!s)return '';
    var p=s.split('-');
    return p[2]+'/'+p[1]+'/'+p[0];
  };
  var newTask={
    name:name.toLowerCase(),exec:exec,
    start:fmtDate(start),end:fmtDate(end),
    pct:0,tz:(link?tz+' '+link:tz).trim()
  };
  DATA.push(newTask);

  /* save to assigned list */
  var arr=getAssigned();
  arr.push({exec:exec,name:name,tz:tz,link:link,start:fmtDate(start),end:fmtDate(end)});
  saveAssigned(arr);

  /* show confirmation */
  var ok=document.getElementById('form-ok');
  if(ok){ok.style.display='block';}
  setTimeout(function(){renderAssign();},1200);
}

function delAssigned(i){
  var arr=getAssigned();
  /* also remove from DATA if possible */
  var item=arr[i];
  if(item){
    DATA=DATA.filter(function(t){
      return !(t.name===item.name.toLowerCase()&&t.exec===item.exec);
    });
  }
  arr.splice(i,1);
  saveAssigned(arr);
  renderAssign();
}
</script>
</body>
</html>
