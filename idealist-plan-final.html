<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>idealist · план</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111;
  --card:#1c1c1c;
  --card2:#242424;
  --card3:#2c2c2c;
  --line:#333;
  --line2:#3e3e3e;
  --terra:#de7a58;
  --terra-bg:rgba(222,122,88,.15);
  --green:#3f574f;
  --green-t:#7ecfba;
  --green-bg:rgba(63,87,79,.22);
  --white:#ffffff;
  --off-white:#f0ece4;
  --light:#d4cfc6;
  --mid:#a09b92;
  --muted:#6e6a62;
  --dim:#3e3b36;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--off-white);font-family:'Inter',sans-serif;min-height:100vh;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ══════════════════════════════
   WELCOME SCREEN
══════════════════════════════ */
#s-welcome{
  align-items:center;
  justify-content:flex-start;
  padding:60px 24px 40px;
}
.welcome-inner{width:100%;max-width:480px;margin:0 auto;}
.welcome-logo{margin-bottom:48px;}
.welcome-logo svg{height:26px;}
.welcome-logo .logo-sub{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.welcome-title{font-size:28px;font-weight:800;color:var(--white);line-height:1.25;margin-bottom:8px;letter-spacing:-.01em;}
.welcome-sub{font-size:15px;font-weight:400;color:var(--mid);margin-bottom:40px;line-height:1.6;}

/* NAME GRID */
.name-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.name-btn{
  background:var(--card);
  border:1.5px solid var(--line2);
  border-radius:16px;
  padding:18px 16px;
  cursor:pointer;
  text-align:left;
  transition:all .18s;
  font-family:'Inter',sans-serif;
}
.name-btn:hover{background:var(--card2);border-color:var(--mid);transform:translateY(-2px);}
.name-btn.selected{background:var(--terra-bg);border-color:var(--terra);box-shadow:0 0 0 1px var(--terra);}
.nb-avatar{
  width:38px;height:38px;
  border-radius:12px;
  background:var(--card3);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;
  color:var(--light);
  margin-bottom:10px;
}
.name-btn.selected .nb-avatar{background:var(--terra);color:#fff;}
.nb-name{font-size:15px;font-weight:700;color:var(--off-white);}
.nb-role{font-size:12px;font-weight:500;color:var(--muted);margin-top:2px;}

/* ALL / MANAGER BUTTONS */
.special-btns{display:flex;gap:10px;margin-bottom:32px;}
.special-btn{
  flex:1;
  background:var(--card);
  border:1.5px solid var(--line2);
  border-radius:14px;
  padding:14px 16px;
  cursor:pointer;
  text-align:center;
  font-family:'Inter',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--mid);
  transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.special-btn:hover{background:var(--card2);border-color:var(--mid);color:var(--light);}
.special-btn.mgr{border-color:var(--green);color:var(--green-t);background:var(--green-bg);}
.special-btn.mgr:hover{background:rgba(63,87,79,.35);}
.special-btn .sb-icon{font-size:22px;}

.enter-btn{
  width:100%;padding:17px;
  font-size:16px;font-weight:700;
  border:none;background:var(--terra);color:#fff;
  border-radius:16px;cursor:pointer;
  font-family:'Inter',sans-serif;
  transition:all .15s;
  letter-spacing:.01em;
}
.enter-btn:hover{background:#c96840;transform:translateY(-1px);box-shadow:0 4px 20px rgba(222,122,88,.4);}
.enter-btn:disabled{background:var(--card3);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}

/* ══════════════════════════════
   TASK SCREEN (my tasks)
══════════════════════════════ */
#s-tasks{padding:0 0 100px;}

/* TOP BAR */
.topbar{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:16px 20px;
}
.topbar-in{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:12px;}
.back-btn{width:36px;height:36px;border:1px solid var(--line2);background:none;color:var(--light);cursor:pointer;font-size:18px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.back-btn:hover{border-color:var(--terra);color:var(--terra);}
.topbar-name{font-size:17px;font-weight:800;color:var(--white);flex:1;}
.topbar-date{font-size:12px;font-weight:500;color:var(--muted);}
.ico-btn{width:36px;height:36px;border:1px solid var(--line2);background:none;color:var(--mid);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .15s;flex-shrink:0;}
.ico-btn:hover{border-color:var(--terra);color:var(--terra);}
.ico-btn.spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.content{max-width:600px;margin:0 auto;padding:24px 20px;}

/* TODAY / DATE HEADERS */
.day-head{margin-bottom:16px;margin-top:28px;}
.day-head:first-child{margin-top:0;}
.day-title{font-size:26px;font-weight:800;color:var(--white);letter-spacing:-.02em;margin-bottom:3px;}
.day-title.future{font-size:20px;font-weight:700;color:var(--light);}
.day-sub{font-size:13px;font-weight:500;color:var(--muted);}

/* TASK CARD */
.tc{background:var(--card);border-radius:20px;padding:20px;margin-bottom:10px;}
.tc.done{background:var(--green-bg);border:1px solid var(--green);}
.tc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.tc-name{font-size:18px;font-weight:700;color:var(--white);line-height:1.3;}
.tc.done .tc-name{color:var(--green-t);}

.badge-done{display:inline-flex;align-items:center;gap:5px;background:var(--green-bg);border:1.5px solid var(--green);color:var(--green-t);font-size:12px;font-weight:700;padding:5px 12px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.badge-pct{font-size:12px;font-weight:700;padding:5px 12px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.b-hi{color:var(--terra);background:var(--terra-bg);border:1.5px solid rgba(222,122,88,.35);}
.b-mid{color:#d4a040;background:rgba(212,160,64,.13);border:1.5px solid rgba(212,160,64,.3);}
.b-lo{color:var(--mid);background:var(--card2);border:1.5px solid var(--line2);}

/* INFO PILLS */
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;border-radius:10px;padding:6px 13px;white-space:nowrap;}
.p-deadline{color:var(--off-white);background:var(--card2);}
.p-deadline.urgent{color:#ff8f8f;background:rgba(255,100,100,.13);}
.p-deadline.done-d{color:var(--green-t);background:var(--green-bg);}
.p-team{color:var(--light);background:var(--card3);}
.p-setter{color:var(--mid);background:var(--card2);font-size:12px;}

/* TZ */
.tz-wrap{background:var(--card2);border-radius:12px;padding:14px;margin-bottom:14px;}
.tz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tz-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--terra);}
.tz-edit{font-size:12px;font-weight:600;color:var(--mid);background:none;border:1px solid var(--line2);cursor:pointer;padding:4px 10px;border-radius:7px;font-family:'Inter',sans-serif;transition:all .15s;}
.tz-edit:hover{color:var(--light);border-color:var(--mid);}
.tz-body{font-size:14px;font-weight:400;color:var(--light);line-height:1.65;}
.tz-body a{color:var(--terra);text-decoration:none;font-weight:600;}
.tz-body a:hover{text-decoration:underline;}
.tz-nil{font-size:13px;color:var(--muted);font-style:italic;}
.tz-ta{width:100%;background:var(--card);border:1.5px solid var(--line2);color:var(--off-white);font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;border-radius:10px;resize:vertical;min-height:70px;outline:none;line-height:1.6;margin-top:6px;}
.tz-ta:focus{border-color:var(--terra);}
.tz-acts{display:flex;gap:8px;margin-top:8px;}
.btn-save{padding:8px 18px;font-size:12px;font-weight:700;border:none;background:var(--terra);color:#fff;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-save:hover{background:#c96840;}
.btn-cx{padding:8px 14px;font-size:12px;font-weight:600;border:1px solid var(--line2);background:none;color:var(--mid);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cx:hover{color:var(--light);}

/* COMPLETION */
.comp-wrap{border-top:1px solid var(--line);padding-top:14px;}
.comp-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.comp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dti{background:var(--card2);border:1.5px solid var(--line2);color:var(--off-white);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;padding:10px 14px;border-radius:12px;outline:none;transition:border-color .15s;flex:1;min-width:180px;}
.dti:focus{border-color:var(--terra);}
.btn-done{padding:11px 22px;font-size:14px;font-weight:700;border:none;background:var(--green);color:#fff;border-radius:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.btn-done:hover{background:#4a6b61;}
.done-info{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--green-t);flex-wrap:wrap;}
.undo{font-size:12px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:underline;}
.undo:hover{color:var(--mid);}

/* ══════════════════════════════
   OVERVIEW SCREEN
══════════════════════════════ */
#s-overview{padding:0 0 40px;}
.ov-note{background:var(--green-bg);border:1px solid var(--green);border-radius:14px;padding:14px 16px;margin-bottom:20px;font-size:14px;font-weight:500;color:var(--green-t);line-height:1.6;}
.ov-day{margin-bottom:8px;}
.ov-dh{display:flex;align-items:center;gap:10px;padding:16px 0 10px;border-bottom:1px solid var(--line);}
.ov-dl{font-size:16px;font-weight:700;color:var(--white);}
.ov-status{font-size:11px;font-weight:700;padding:4px 12px;border-radius:10px;margin-left:auto;}
.ov-busy{color:var(--terra);background:var(--terra-bg);}
.ov-free{color:var(--green-t);background:var(--green-bg);}
.ov-pr{display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--card2);}
.ov-pr:last-child{border-bottom:none;}
.ov-nm{font-size:13px;font-weight:700;color:var(--light);min-width:86px;}
.ov-tl{flex:1;display:flex;flex-direction:column;gap:5px;}
.ov-ti{font-size:14px;font-weight:500;color:var(--off-white);line-height:1.4;}
.ov-ti.done{color:var(--green-t);}
.ov-pct{font-size:11px;font-weight:700;color:var(--terra);background:var(--terra-bg);padding:1px 7px;border-radius:6px;margin-left:6px;}

/* WEEK NAV */
.wnav{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.wa{width:36px;height:36px;border:1px solid var(--line2);background:none;color:var(--light);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:10px;transition:all .15s;}
.wa:hover{border-color:var(--terra);color:var(--terra);}
.wlbl{font-size:15px;font-weight:700;color:var(--white);flex:1;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card);border-radius:28px 28px 0 0;padding:20px 20px 48px;width:100%;max-width:600px;max-height:94vh;overflow-y:auto;}
.m-handle{width:40px;height:4px;background:var(--card3);border-radius:2px;margin:0 auto 20px;}
.m-title{font-size:22px;font-weight:800;color:var(--white);margin-bottom:6px;letter-spacing:-.01em;}
.m-sub{font-size:14px;color:var(--mid);margin-bottom:22px;line-height:1.6;}
.fg{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.fl{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);}
.fl span{color:var(--terra);}
.fi,.fs,.fta{background:var(--card2);border:1.5px solid var(--line2);color:var(--off-white);font-family:'Inter',sans-serif;font-size:15px;font-weight:400;padding:13px 16px;border-radius:14px;outline:none;transition:border-color .15s;width:100%;}
.fi::placeholder,.fta::placeholder{color:var(--muted);}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--terra);}
.fta{resize:vertical;min-height:90px;line-height:1.6;}
.fs{cursor:pointer;}
.m-submit{width:100%;padding:16px;font-size:15px;font-weight:700;border:none;background:var(--terra);color:#fff;border-radius:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:all .15s;}
.m-submit:hover{background:#c96840;}
.m-ok{display:none;background:var(--green-bg);border:1px solid var(--green);color:var(--green-t);font-size:14px;font-weight:600;padding:14px;border-radius:12px;text-align:center;margin-top:14px;}
.asgn-sec{margin-top:28px;}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.ac{background:var(--card2);border-left:3px solid var(--terra);border-radius:0 14px 14px 0;padding:14px 16px;margin-bottom:10px;position:relative;}
.ac-who{font-size:11px;font-weight:700;color:var(--terra);text-transform:capitalize;margin-bottom:3px;}
.ac-name{font-size:15px;font-weight:700;color:var(--white);margin-bottom:5px;}
.ac-meta{font-size:13px;color:var(--light);font-weight:500;margin-bottom:3px;}
.ac-tz{font-size:13px;color:var(--mid);line-height:1.6;}
.ac-lnk a{font-size:13px;color:var(--terra);text-decoration:none;font-weight:600;}
.ac-del{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 8px;border-radius:6px;transition:color .15s;}
.ac-del:hover{color:#e07070;}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;z-index:200;display:flex;align-items:center;gap:8px;padding:15px 24px;background:var(--terra);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:28px;cursor:pointer;box-shadow:0 4px 24px rgba(222,122,88,.4);transition:all .2s;letter-spacing:.01em;}
.fab:hover{background:#c96840;transform:translateY(-2px);box-shadow:0 6px 28px rgba(222,122,88,.5);}
.fab:active{transform:translateY(0);}

/* EMPTY */
.empty{padding:60px 0;text-align:center;}
.e-dot{width:8px;height:8px;background:var(--terra);border-radius:50%;margin:0 auto 16px;}
.e-txt{font-size:15px;font-weight:500;color:var(--muted);}

/* ERR */
.errb{background:var(--terra-bg);border:1px solid rgba(222,122,88,.35);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px;font-weight:600;color:var(--terra);display:none;}

@media(max-width:480px){
  #s-welcome{padding:48px 18px 32px;}
  .name-grid{grid-template-columns:1fr 1fr;}
  .welcome-title{font-size:24px;}
  .topbar{padding:14px 16px;}
  .content{padding:18px 16px;}
  .tc-name{font-size:16px;}
  .day-title{font-size:22px;}
  .fab{right:16px;bottom:20px;}
}
</style>
</head>

function lsJ(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
function lsJS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function tKey(n,e){return 'td5::'+n+'::'+e;}
function getTD(n,e){return lsJ(tKey(n,e))||{done:false,eta:'',tz:'',doneMs:null};}
function setTD(n,e,o){lsJS(tKey(n,e),o);}
function getAsgn(){return lsJ('ia5')||[];}
function setAsgn(a){lsJS('ia5',a);}

/* ── UTILS ── */
function pd(s){if(!s)return null;var p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0]);}
function onDay(t,d){
  var td=getTD(t.name,t.exec);
  var dd=new Date(d); dd.setHours(0,0,0,0);
  var s=pd(t.start); if(!s)return false;
  if(td.done&&td.doneMs){var dm=new Date(td.doneMs);dm.setHours(0,0,0,0);return dd>=s&&dd<=dm;}
  var e=pd(t.end); if(!e)return false;
  return dd>=s&&dd<=e;
}
function fmtD(d){return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});}
function fmtS(d){return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});}
function fmtDT(s){if(!s)return '';var d=new Date(s);return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'})+' в '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dLeft(e){var ed=pd(e);if(!ed)return 999;return Math.round((ed-today)/86400000);}
function initials(nm){return nm?nm.charAt(0).toUpperCase():'';}
function wkDays(off){
  var b=new Date(today);b.setDate(b.getDate()+off*7);
  var dow=b.getDay()===0?6:b.getDay()-1;
  var mon=new Date(b);mon.setDate(b.getDate()-dow);
  var r=[];for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);r.push(d);}return r;
}
function getExecs(){
  var s={};DATA.forEach(function(t){t.exec.trim().split(/\s+/).forEach(function(n){if(n.length>1)s[n.toLowerCase()]=1;});});
  return Object.keys(s).sort();
}
function tzViewHtml(val){
  if(!val)return '<div class="tz-nil">не указано</div>';
  var isL=(val.indexOf('http')===0);
  return '<div class="tz-body">'+(isL?'<a href="'+esc(val)+'" target="_blank">'+esc(val)+'</a>':esc(val))+'</div>';
}

function doRefresh(){
  var btn=document.getElementById('rbtn'); if(btn)btn.classList.add('spin');
  if(AKEY!=='ВСТАВЬТЕ_ВАШ_API_KEY_ЗДЕСЬ'){
    fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SID+'/values/'+encodeURIComponent(SNAME+'!A7:K300')+'?key='+AKEY)
    .then(function(r){if(!r.ok)throw 0;return r.json();})
    .then(function(js){
      DATA=(js.values||[]).filter(function(r){return r[0]&&r[1];}).map(function(r){
        var ex=(r[3]||'').trim().toLowerCase().replace(/\bюля\b/g,'').replace(/\bландграф\b/g,'владимир').replace(/\s+/g,' ').trim();
        return{name:(r[1]||'').trim().toLowerCase(),exec:ex,start:(r[5]||'').trim(),end:(r[7]||'').trim(),pct:parseInt((r[8]||'0').replace('%',''))||0,tz:(r[9]||'').trim(),setter:''};
      }).filter(function(t){return t.exec;});
      mergeAsgn();
      var eb=document.getElementById('errb'); if(eb)eb.style.display='none';
    }).catch(function(){
      DATA=FB.slice(); mergeAsgn();
      var eb=document.getElementById('errb'); if(eb){eb.textContent='Данные не загрузились';eb.style.display='block';}
    }).finally(function(){if(btn)btn.classList.remove('spin');renderTasks();buildWelcome();});
  } else {mergeAsgn();if(btn)btn.classList.remove('spin');renderTasks();buildWelcome();}
}
function doRefresh2(){

function mergeAsgn(){
  getAsgn().forEach(function(item){
    var ex=DATA.some(function(t){return t.name===item.name.toLowerCase()&&t.exec===item.exec;});
    if(!ex) DATA.push({name:item.name.toLowerCase(),exec:item.exec,start:item.start,end:item.end,pct:0,tz:(item.tz||'')+(item.link?' '+item.link:''),setter:item.setter||''});
  });
}

/* ── RENDER TASKS ── */
function renderTasks(){
  var c=document.getElementById('tasks-content');
  if(!c)return;

  /* build 14-day window centered on today + offset */
  var allDays=[];
  for(var i=0;i<14;i++){
    var d=new Date(today);
    d.setDate(today.getDate() + myOff*14 + i);
    allDays.push(d);
  }

  var byDay=allDays.map(function(day){
    return{day:day,tasks:DATA.filter(function(t){
      if(!onDay(t,day))return false;
      if(!currentPerson)return true;
      return t.exec.trim().split(/\s+/).indexOf(currentPerson)>=0;
    })};
  });

  var all=[];byDay.forEach(function(d){all=all.concat(d.tasks);});
  var iw=all.filter(function(t){return t.pct<100;});
  var dn=all.filter(function(t){return t.pct===100;});

  /* nav label */
  var first=allDays[0], last=allDays[13];
  var navLabel=fmtS(first)+' \u2014 '+fmtS(last);

  var h='<div class="wnav">'
    +'<button class="wa" onclick="myOff--;renderTasks()">&#8592;</button>'
    +'<div class="wlbl">'+navLabel+'</div>'
    +'<button class="wa" onclick="myOff++;renderTasks()">&#8594;</button>'
    +'</div>';

  /* summary line */
  h+='<div style="display:flex;gap:20px;margin-bottom:24px;">'
    +'<div><span style="font-size:22px;font-weight:700;color:var(--terra)">'+iw.length+'</span>'
    +'<span style="font-size:12px;font-weight:600;color:var(--muted);margin-left:5px;letter-spacing:.06em;text-transform:uppercase;">в работе</span></div>'
    +'<div><span style="font-size:22px;font-weight:700;color:var(--green-t)">'+dn.length+'</span>'
    +'<span style="font-size:12px;font-weight:600;color:var(--muted);margin-left:5px;letter-spacing:.06em;text-transform:uppercase;">готово</span></div>'
    +'</div>';

  var any=false;
  byDay.forEach(function(item){
    if(!item.tasks.length)return;any=true;
    var day=item.day, tasks=item.tasks;
    var isT=(day.getTime()===today.getTime());
    var isTomorrow=(day.getTime()===today.getTime()+86400000);
    var isYesterday=(day.getTime()===today.getTime()-86400000);

    /* day title */
    var titleText, titleClass='day-title';
    if(isT){titleText='Сегодня';}
    else if(isTomorrow){titleText='Завтра';titleClass='day-title future';}
    else if(isYesterday){titleText='Вчера';titleClass='day-title future';}
    else{titleText=fmtD(day);titleClass='day-title future';}

    var subText=day.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});

    h+='<div class="day-head">'
      +'<div class="'+titleClass+'">'+titleText+'</div>'
      +'<div class="day-sub">'+subText+'</div>'
      +'</div>';

    var act=tasks.filter(function(t){return t.pct<100;});
    var dnt=tasks.filter(function(t){return t.pct===100;});

    act.concat(dnt).forEach(function(t,idx){
      var isDone=(t.pct===100);
      var tk=day.getTime()+'-'+idx;
      var td=getTD(t.name,t.exec);
      var tzVal=td.tz||t.tz||'';
      var dl=dLeft(t.end);

      /* badge */
      var badge=isDone?'<span class="badge-done">&#10003; Выполнено</span>'
        :(t.pct>=70?'<span class="badge-pct b-hi">'+t.pct+'%</span>'
        :(t.pct>=30?'<span class="badge-pct b-mid">'+t.pct+'%</span>'
        :'<span class="badge-pct b-lo">'+t.pct+'%</span>'));

      /* deadline pill */
      var dlCls,dlTxt;
      if(isDone){dlCls='done-d';dlTxt='&#10003; сдано';}
      else if(dl<0){dlCls='urgent';dlTxt='просрочено!';}
      else if(dl===0){dlCls='urgent';dlTxt='клиент ждёт сегодня!';}
      else if(dl===1){dlCls='urgent';dlTxt='клиент ждёт завтра';}
      else{dlCls='';dlTxt='клиент ждёт '+fmtD(pd(t.end));}
      var dlPill='<span class="pill p-deadline '+dlCls+'">&#128339; '+dlTxt+'</span>';

      /* team pill — who else is on this task */
      var allExecs=t.exec.trim().split(/\s+/).filter(function(x){return x.length>1;});
      var teamPill='';
      if(currentPerson && allExecs.length>1){
        var others=allExecs.filter(function(x){return x.toLowerCase()!==currentPerson;}).map(cap).join(', ');
        if(others) teamPill='<span class="pill p-team">&#128101; с вами: '+others+'</span>';
      } else if(!currentPerson && allExecs.length>0){
        teamPill='<span class="pill p-team">&#128100; '+allExecs.map(cap).join(', ')+'</span>';
      }

      var setPill=(t.setter?'<span class="pill p-setter">от '+cap(esc(t.setter))+'</span>':'');

      /* completion */
      var compH='';
      if(!isDone){
        compH='<div class="comp-wrap"><div class="comp-lbl">Когда вы сделаете?</div>'
          +'<div class="comp-row">'
          +'<input class="dti" type="datetime-local" id="eta-'+tk+'">'
          +'<button class="btn-done" onclick="markDone(\''+esc(t.name)+'\',\''+esc(t.exec)+'\',\''+tk+'\')">Готово &#10003;</button>'
          +'</div></div>';
      } else {
        var etaS=td.eta?fmtDT(td.eta):'';
        compH='<div class="comp-wrap"><div class="done-info">&#10003; Выполнено'
          +(etaS?' &middot; '+etaS:'')
          +'<button class="undo" onclick="undoDone(\''+esc(t.name)+'\',\''+esc(t.exec)+'\')">отменить</button>'
          +'</div></div>';
      }

      h+='<div class="tc'+(isDone?' done':'')+'">'
        +'<div class="tc-head"><div class="tc-name">'+cap(t.name)+'</div>'+badge+'</div>'
        +'<div class="pills">'+dlPill+teamPill+setPill+'</div>'
        +'<div class="tz-wrap">'
        +'<div class="tz-top"><span class="tz-label">ТЗ и макет</span>'
        +'<button class="tz-edit" onclick="tzEd(\''+tk+'\')">&#9998; Редактировать</button></div>'
        +'<div id="tv-'+tk+'">'+tzViewHtml(tzVal)+'</div>'
        +'<div id="te-'+tk+'" style="display:none">'
        +'<textarea class="tz-ta" id="ta-'+tk+'">'+esc(tzVal)+'</textarea>'
        +'<div class="tz-acts">'
        +'<button class="btn-save" onclick="tzSv(\''+esc(t.name)+'\',\''+esc(t.exec)+'\',\''+tk+'\')">Сохранить</button>'
        +'<button class="btn-cx" onclick="tzCx(\''+tk+'\')">Отмена</button>'
        +'</div></div></div>'
        +compH+'</div>';
    });
  });

  if(!any) h+='<div class="empty"><div class="e-dot"></div><div class="e-txt">Нет задач на этот период'+(currentPerson?' \u00b7 '+cap(currentPerson):'')+'</div></div>';
  c.innerHTML=h;
}

/* ── TZ ── */
function tzEd(tk){var v=document.getElementById('tv-'+tk),e=document.getElementById('te-'+tk);if(v)v.style.display='none';if(e)e.style.display='block';}
function tzCx(tk){var v=document.getElementById('tv-'+tk),e=document.getElementById('te-'+tk);if(v)v.style.display='block';if(e)e.style.display='none';}
function tzSv(n,ex,tk){
  var a=document.getElementById('ta-'+tk);if(!a)return;
  var val=a.value.trim();
  var td=getTD(n,ex);td.tz=val;setTD(n,ex,td);
  DATA.forEach(function(t){if(t.name===n&&t.exec===ex)t.tz=val;});
  var v=document.getElementById('tv-'+tk);
  if(v) v.innerHTML=tzViewHtml(val);
  tzCx(tk);
}

/* ── COMPLETE ── */
function markDone(n,ex,tk){
  var inp=document.getElementById('eta-'+tk);
  var eta=inp?inp.value:'';
  var td=getTD(n,ex);td.done=true;td.eta=eta;td.doneMs=(new Date()).getTime();setTD(n,ex,td);
  DATA.forEach(function(t){if(t.name===n&&t.exec===ex)t.pct=100;});
  renderTasks();
}
function undoDone(n,ex){
  var td=getTD(n,ex);td.done=false;td.doneMs=null;setTD(n,ex,td);
  DATA.forEach(function(t){if(t.name===n&&t.exec===ex)t.pct=0;});
  renderTasks();
}

/* ── OVERVIEW ── */
function renderOv(){
  var c=document.getElementById('ov-content');if(!c)return;
  var days=wkDays(ovOff);
  var h='<div class="ov-note">&#128200; Загрузка производства — кто чем занят по дням.</div>'
    +'<div class="wnav">'
    +'<button class="wa" onclick="ovOff--;renderOv()">&#8592;</button>'
    +'<div class="wlbl">'+fmtS(days[0])+' \u2014 '+fmtS(days[6])+'</div>'
    +'<button class="wa" onclick="ovOff++;renderOv()">&#8594;</button>'
    +'</div>';
  var any=false;
  days.forEach(function(day){
    var isT=(day.getTime()===today.getTime());
    var dt=DATA.filter(function(t){return onDay(t,day);});
    if(!dt.length)return;any=true;
    var byE={};
    dt.forEach(function(t){t.exec.trim().split(/\s+/).filter(function(x){return x.length>1;}).forEach(function(p){var k=p.toLowerCase();if(!byE[k])byE[k]=[];byE[k].push(t);});});
    var iw=dt.filter(function(t){return t.pct<100;}).length;
    h+='<div class="ov-day"><div class="ov-dh">'
      +'<span class="ov-dl">'+fmtD(day)+', '+day.toLocaleDateString('ru-RU',{weekday:'long'})+'</span>'
      +(isT?'<span style="background:var(--terra);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;">сегодня</span>':'')
      +(iw>0?'<span class="ov-status ov-busy">'+iw+' в работе</span>':'<span class="ov-status ov-free">всё готово</span>')
      +'</div>';
    Object.keys(byE).sort().forEach(function(ex){
      var ts=byE[ex];
      h+='<div class="ov-pr"><div class="ov-nm">'+cap(ex)+'</div><div class="ov-tl">';
      ts.forEach(function(t){
        h+='<div class="ov-ti'+(t.pct===100?' done':'')+'">'
          +cap(t.name)
          +(t.pct>0&&t.pct<100?'<span class="ov-pct">'+t.pct+'%</span>':'')
          +'</div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  });
  if(!any) h+='<div class="empty"><div class="e-dot"></div><div class="e-txt">Нет задач на эту неделю</div></div>';
  c.innerHTML=h;
}

/* ── MODAL ── */
function openModal(){
  var sel=document.getElementById('f-exec');
  if(sel) sel.innerHTML=getExecs().map(function(e){return '<option value="'+e+'">'+cap(e)+'</option>';}).join('');
  renderAsgnList();
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function maybeClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

function renderAsgnList(){
  var arr=getAsgn(),c=document.getElementById('asgn-list');
  if(!arr.length){c.innerHTML='';return;}
  var h='<div class="sec-lbl">Поставленные задачи ('+arr.length+')</div>';
  arr.forEach(function(item,i){
    h+='<div class="ac"><button class="ac-del" onclick="delAsgn('+i+')">&#10005;</button>'
      +'<div class="ac-who">'+cap(esc(item.exec))+'</div>'
      +'<div class="ac-name">'+esc(item.name)+'</div>'
      +(item.setter?'<div class="ac-meta">Поставил: '+cap(esc(item.setter))+'</div>':'')
      +'<div class="ac-meta">Клиент ждёт: '+esc(item.endLabel||item.end)+'</div>'
      +(item.tz?'<div class="ac-tz">'+esc(item.tz)+'</div>':'')
      +(item.link?'<div class="ac-lnk"><a href="'+esc(item.link)+'" target="_blank">'+esc(item.link)+'</a></div>':'')
      +'</div>';
  });
  c.innerHTML=h;
}

function submitTask(){
  var exec=document.getElementById('f-exec').value;
  var setter=document.getElementById('f-setter').value.trim();
  var name=document.getElementById('f-name').value.trim();
  var tz=document.getElementById('f-tz').value.trim();
  var link=document.getElementById('f-link').value.trim();
  var endDT=document.getElementById('f-end').value;
  if(!setter){document.getElementById('f-setter').focus();return;}
  if(!name){document.getElementById('f-name').focus();return;}
  if(!endDT){document.getElementById('f-end').focus();return;}

  var ed=new Date(endDT);
  function z(n){return(n<10?'0':'')+n;}
  var endFmt=z(ed.getDate())+'/'+z(ed.getMonth()+1)+'/'+ed.getFullYear();
  var endLabel=ed.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})+' в '+ed.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  var nd=new Date();
  var startFmt=z(nd.getDate())+'/'+z(nd.getMonth()+1)+'/'+nd.getFullYear();

  DATA.push({name:name.toLowerCase(),exec:exec,start:startFmt,end:endFmt,pct:0,tz:(tz+(link?' '+link:'')).trim(),setter:setter});
  var arr=getAsgn();
  arr.push({exec:exec,setter:setter,name:name,tz:tz,link:link,start:startFmt,end:endFmt,endLabel:endLabel});
  setAsgn(arr);
  ['f-setter','f-name','f-tz','f-link','f-end'].forEach(function(id){document.getElementById(id).value='';});
  var ok=document.getElementById('m-ok');ok.style.display='block';
  setTimeout(function(){ok.style.display='none';},2500);
  renderAsgnList();
  /* refresh tasks if visible */
  if(document.getElementById('s-tasks').classList.contains('active')) renderTasks();
}
function delAsgn(i){
  var arr=getAsgn(),item=arr[i];
  if(item) DATA=DATA.filter(function(t){return !(t.name===item.name.toLowerCase()&&t.exec===item.exec);});
  arr.splice(i,1);setAsgn(arr);renderAsgnList();
}
</script>
